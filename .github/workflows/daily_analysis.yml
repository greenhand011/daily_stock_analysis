name: Daily Stock Analysis

on:
  push:
    paths:
      - 'portfolio.json'
      - '.github/workflows/daily_analysis.yml'
      - '.env'
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      stock_code:
        description: 'One-time stock code (optional)'
        required: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download TrendRadar News Data
        uses: dawidd6/action-download-artifact@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: crawler.yml
          repo: DansornChan/danstrendrader
          name: news-summary-json
          path: .
          search_artifacts: true
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Required Directories
        run: |
          mkdir -p data logs reports output

      - name: Check OpenAI Connectivity
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
          HTTP_PROXY: ${{ vars.HTTP_PROXY || secrets.HTTP_PROXY }}
          HTTPS_PROXY: ${{ vars.HTTPS_PROXY || secrets.HTTPS_PROXY }}
          ALL_PROXY: ${{ vars.ALL_PROXY || secrets.ALL_PROXY }}
        run: |
          python - <<'PY'
          import os
          import sys
          import requests

          api_key = os.getenv("OPENAI_API_KEY", "").strip()
          base_url = os.getenv("OPENAI_BASE_URL", "https://api.openai.com/v1").strip().rstrip("/")

          print("==========================================")
          print("OpenAI Base URL:", base_url)
          print("HTTP_PROXY configured:", bool(os.getenv("HTTP_PROXY")))
          print("HTTPS_PROXY configured:", bool(os.getenv("HTTPS_PROXY")))
          print("ALL_PROXY configured:", bool(os.getenv("ALL_PROXY")))

          if not api_key:
              print("OpenAI API Key: missing")
              sys.exit(1)

          try:
              response = requests.get(
                  f"{base_url}/models",
                  headers={"Authorization": f"Bearer {api_key}"},
                  timeout=20,
              )
              print("OpenAI connectivity status:", response.status_code)
              print(response.text[:200])
              response.raise_for_status()
          except Exception as exc:
              print("OpenAI connectivity check failed:", repr(exc))
              sys.exit(1)
          print("==========================================")
          PY

      - name: Run Stock Analysis
        env:
          # ========== AI Model ==========
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL || 'openai/gpt-4o-mini' }}
          HTTP_PROXY: ${{ vars.HTTP_PROXY || secrets.HTTP_PROXY }}
          HTTPS_PROXY: ${{ vars.HTTPS_PROXY || secrets.HTTPS_PROXY }}
          ALL_PROXY: ${{ vars.ALL_PROXY || secrets.ALL_PROXY }}

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini-2.5-flash' }}
          GEMINI_REQUEST_DELAY: '10.0'

          # ========== Encoding ==========
          PYTHONIOENCODING: utf-8
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
          PYTHONUTF8: 1

          # ========== Data Sources ==========
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}

          # ========== Notifications ==========
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_FOLDER_TOKEN: ${{ secrets.FEISHU_FOLDER_TOKEN }}

          # ========== System ==========
          STOCK_LIST: ${{ vars.STOCK_LIST || 'IVV,QQQM,VTI,DIA,IWM,MSFT,NVDA,AMZN,GOOGL,META' }}
          MARKET_REVIEW_REGION: ${{ vars.MARKET_REVIEW_REGION || 'us' }}
          REPORT_TYPE: ${{ vars.REPORT_TYPE || 'simple' }}
          LOG_LEVEL: INFO
          DATA_DAYS: 60
          MAX_CONCURRENT: 1
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          ONETIME_CODE="${{ github.event.inputs.stock_code }}"

          echo "=========================================="
          echo "Starting AI-CIO analysis"
          echo "Time: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "Stock list: ${STOCK_LIST}"
          echo "Market region: ${MARKET_REVIEW_REGION}"
          echo "OpenAI Model: ${OPENAI_MODEL}"
          echo "OpenAI Base URL: ${OPENAI_BASE_URL}"
          if [ -n "${OPENAI_API_KEY}" ]; then
            echo "OpenAI API Key: configured"
          else
            echo "OpenAI API Key: missing"
          fi
          if [ -n "${FEISHU_WEBHOOK_URL}" ]; then
            echo "Feishu Webhook: configured"
          else
            echo "Feishu Webhook: missing"
          fi

          if [ -f "news_summary.json" ]; then
            echo "News summary detected"
          else
            echo "News summary not found"
          fi
          echo "=========================================="

          if [ -n "$ONETIME_CODE" ]; then
            echo "One-time analysis mode: $ONETIME_CODE"
            python main.py --stocks "$ONETIME_CODE"
          elif [ "$MODE" = "market-only" ]; then
            python main.py --market-review
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py
          else
            python main.py
          fi

      - name: Upload Analysis Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30
