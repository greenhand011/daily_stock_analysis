name: 每日股票分析

on:
  push:
    paths:
      - 'portfolio.json'
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      stock_code:
        description: '临时分析代码(可选)'
        required: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 下载 TrendRadar 新闻数据
        uses: dawidd6/action-download-artifact@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: crawler.yml
          repo: DansornChan/danstrendrader
          name: news-summary-json
          path: .
          search_artifacts: true
        continue-on-error: true

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: |
          mkdir -p data logs reports output
      
      - name: 执行股票分析
        env:
          # ========== AI 模型配置 ==========
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_BASE_URL: https://api.deepseek.com/v1
          OPENAI_MODEL: deepseek-chat
          
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini-2.5-flash' }}
          GEMINI_REQUEST_DELAY: '10.0'
          
          # ========== 编码设置 ==========
          PYTHONIOENCODING: utf-8
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
          PYTHONUTF8: 1
          
          # ========== 数据源配置 ==========
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          
          # ========== 通知渠道配置 ==========
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_FOLDER_TOKEN: ${{ secrets.FEISHU_FOLDER_TOKEN }}
          
          # ========== 系统配置 ==========
          # 注释掉这一行，系统将使用 portfolio.json
          # STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          LOG_LEVEL: INFO
          DATA_DAYS: 60
          MAX_CONCURRENT: 1
        run: |
          # 设置编码环境
          export PYTHONIOENCODING=utf-8
          export LANG=C.UTF-8
          export LC_ALL=C.UTF-8
          export PYTHONUTF8=1
          
          MODE="${{ github.event.inputs.mode || 'full' }}"
          ONETIME_CODE="${{ github.event.inputs.stock_code }}"
          
          echo "=========================================="
          echo "🚀 启动 AI-CIO 分析系统"
          echo "时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          
          if [ -f "news_summary.json" ]; then
            echo "✅ 检测到新闻数据"
          else
            echo "⚠️ 未检测到新闻数据"
          fi
          echo "=========================================="
          
          if [ -n "$ONETIME_CODE" ]; then
            echo "🎯 单次狙击模式: $ONETIME_CODE"
            python main.py --stocks "$ONETIME_CODE" --workers 1
          elif [ "$MODE" = "market-only" ]; then
            python main.py --market-review
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --workers 1
          else
            python main.py --workers 1
          fi
      
      - name: 上传分析报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30